<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MAGI System 2</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="logo">MAGI<span class="logo-dim">System</span>2</span>
      <span class="status-pill" id="status">Connecting</span>
    </div>
    <div class="nav-toggles">
      <label class="toggle-chip" title="Show persona inner thoughts">
        <input type="checkbox" id="toggle-thoughts">
        <span class="chip-label">💭 Thoughts</span>
      </label>
      <label class="toggle-chip" title="Show facilitator analysis">
        <input type="checkbox" id="toggle-facilitator">
        <span class="chip-label">🎯 Facilitator</span>
      </label>
    </div>
    <div class="nav-actions">
      <button class="btn-icon" id="btn-theme" title="Toggle theme">☀</button>
      <button class="btn btn-start" id="btn-start">▶ Start</button>
    </div>
  </div>
</nav>

<div class="main">
  <!-- Left: Timeline -->
  <div class="timeline" id="timeline">
    <div class="empty-state" id="empty-state">
      Click "Start Discussion" to begin.
    </div>
  </div>

  <!-- Right: Persona panels -->
  <div class="sidebar" id="sidebar">
    <!-- Populated dynamically -->
  </div>
</div>

<!-- Activity indicator -->
<div class="activity-bar" id="activity-bar" style="display:none;">
  <div class="activity-spinner"></div>
  <span class="activity-who" id="activity-who"></span>
  <span class="activity-what" id="activity-what"></span>
</div>

<!-- Convergence bar -->
<div class="convergence-bar">
  <div class="convergence-label">Convergence</div>
  <div class="convergence-track">
    <div class="convergence-fill" id="convergence-fill" style="width: 0%"></div>
  </div>
  <span class="convergence-value" id="convergence-value">0.00</span>
  <span class="phase-label" id="phase-label">—</span>
  <span class="turn-label" id="turn-label">Turn 0</span>
  <span class="token-divider">|</span>
  <span class="token-label">Pro <span id="token-pro">0</span></span>
  <span class="token-label">Flash <span id="token-flash">0</span></span>
  <span class="token-label token-total">Total <span id="token-total">0</span></span>
</div>

<script>
(function() {
  var ws = null;
  var showThoughts = false;
  var showFacilitator = false;

  var timeline = document.getElementById('timeline');
  var sidebar = document.getElementById('sidebar');
  var emptyState = document.getElementById('empty-state');
  var statusEl = document.getElementById('status');
  var activityBar = document.getElementById('activity-bar');
  var activityWho = document.getElementById('activity-who');
  var activityWhat = document.getElementById('activity-what');
  var convFill = document.getElementById('convergence-fill');
  var convValue = document.getElementById('convergence-value');
  var phaseLabel = document.getElementById('phase-label');
  var turnLabel = document.getElementById('turn-label');

  document.getElementById('toggle-thoughts').addEventListener('change', function(e) {
    showThoughts = e.target.checked;
    document.querySelectorAll('.thought-bubble').forEach(function(el) {
      el.style.display = showThoughts ? 'block' : 'none';
    });
  });

  document.getElementById('toggle-facilitator').addEventListener('change', function(e) {
    showFacilitator = e.target.checked;
    document.querySelectorAll('.facilitator-insight').forEach(function(el) {
      el.style.display = showFacilitator ? 'block' : 'none';
    });
  });

  document.getElementById('btn-theme').addEventListener('click', function() {
    var el = document.documentElement;
    var current = el.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    if (!current) next = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'light' : 'dark';
    el.setAttribute('data-theme', next);
    localStorage.setItem('magi2-theme', next);
    this.textContent = next === 'dark' ? '☀' : '☽';
  });
  (function() {
    var saved = localStorage.getItem('magi2-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('btn-theme').textContent = saved === 'dark' ? '☀' : '☽';
    }
  })();

  document.getElementById('btn-start').addEventListener('click', function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({action: 'start'}));
      this.disabled = true;
      this.textContent = 'Running...';
      emptyState.style.display = 'none';
    }
  });

  function connect() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws');

    ws.onopen = function() {
      statusEl.textContent = 'Connected';
      statusEl.className = 'status-pill connected';
      ws.send(JSON.stringify({action: 'get_config'}));
    };

    ws.onclose = function() {
      statusEl.textContent = 'Disconnected';
      statusEl.className = 'status-pill disconnected';
      setTimeout(connect, 3000);
    };

    ws.onmessage = function(e) {
      var msg = JSON.parse(e.data);
      handleEvent(msg.type, msg.data);
    };
  }

  var tokenPro = document.getElementById('token-pro');
  var tokenFlash = document.getElementById('token-flash');
  var tokenTotal = document.getElementById('token-total');

  function updateTokens(usage) {
    tokenPro.textContent = (usage.pro || 0).toLocaleString();
    tokenFlash.textContent = (usage.flash || 0).toLocaleString();
    tokenTotal.textContent = (usage.total || 0).toLocaleString();
  }

  function showActivity(who, what) {
    activityWho.textContent = who;
    activityWhat.textContent = what;
    activityBar.style.display = 'flex';
  }

  function hideActivity() {
    activityBar.style.display = 'none';
  }

  function handleEvent(type, data) {
    // Hide activity on any result event
    if (type !== 'activity') hideActivity();

    switch(type) {
      case 'activity':
        showActivity(data.who, data.what);
        break;

      case 'config':
        statusEl.textContent = 'Ready — ' + data.topic.substring(0, 60) + '...';
        if (data.show_thoughts) {
          showThoughts = true;
          document.getElementById('toggle-thoughts').checked = true;
        }
        if (data.show_facilitator) {
          showFacilitator = true;
          document.getElementById('toggle-facilitator').checked = true;
        }
        break;

      case 'topic_analyzed':
        addTimelineCard('facilitator', '📋 Topic Analyzed', data.summary);
        data.personas.forEach(function(p) {
          personaIcons[p.name] = p.icon || '👤';
          addPersonaPanel(p.name, p.icon || '👤', p.archetype);
        });
        break;

      case 'stream_chunk':
        handleStreamChunk(data);
        break;

      case 'persona_turn':
        finalizeStreamCard(data.speaker, data.turn);
        addPersonaTurn(data);
        updatePersonaPanel(data.speaker, data);
        turnLabel.textContent = 'Turn ' + data.turn;
        phaseLabel.textContent = data.phase;
        if (data.token_usage) updateTokens(data.token_usage);
        break;

      case 'facilitator_intervention':
        addTimelineCard('facilitator', 'Facilitator', data.content);
        phaseLabel.textContent = data.phase;
        break;

      case 'convergence_update':
        var pct = Math.round(data.facilitator_assessment * 100);
        convFill.style.width = pct + '%';
        convValue.textContent = data.facilitator_assessment.toFixed(2);
        if (data.is_converged) {
          convFill.classList.add('converged');
          statusEl.textContent = 'Converged!';
        }
        break;

      case 'closing_statement':
        finalizeAllStreamCards();
        addPersonaTurn({
          speaker: data.speaker,
          statement: '[Final] ' + data.statement,
          inner_thoughts: data.inner_thoughts,
          turn: -1,
        });
        break;

      case 'discussion_complete':
        finalizeAllStreamCards();
        addTimelineCard('facilitator', 'Synthesis Report', data.report);
        addDownloadButton(data);
        statusEl.textContent = 'Complete — ' + data.turns + ' turns';
        document.getElementById('btn-start').textContent = 'Complete';
        if (data.token_usage) updateTokens(data.token_usage);
        turnLabel.textContent = 'Turn ' + data.turns;
        break;
    }
    // Auto-scroll
    timeline.scrollTop = timeline.scrollHeight;
  }

  // ── Persona icon map ──
  var personaIcons = {};  // name -> emoji

  // ── Streaming card management ──
  var activeStreamCards = {};  // key -> card element

  function handleStreamChunk(data) {
    var key = data.speaker + '-' + data.turn;
    var card = activeStreamCards[key];

    if (!card) {
      card = document.createElement('div');
      card.className = 'card card-persona card-streaming';
      var sIcon = personaIcons[data.speaker] || '👤';
      var header = document.createElement('div');
      header.className = 'card-header';
      header.textContent = sIcon + ' ' + data.speaker + ' — Turn ' + data.turn + ' (streaming...)';
      card.appendChild(header);
      var cotEl = document.createElement('div');
      cotEl.className = 'stream-cot';
      cotEl.style.display = showThoughts ? 'block' : 'none';
      card.appendChild(cotEl);
      var textEl = document.createElement('div');
      textEl.className = 'stream-text';
      card.appendChild(textEl);
      timeline.appendChild(card);
      activeStreamCards[key] = card;
    }

    if (data.chunk_type === 'thought') {
      var cot = card.querySelector('.stream-cot');
      cot.textContent += data.text;
      cot.style.display = showThoughts ? 'block' : 'none';
      // Auto-scroll CoT section to bottom
      cot.scrollTop = cot.scrollHeight;
    } else {
      var txt = card.querySelector('.stream-text');
      txt.textContent += data.text;
    }

    // Auto-scroll timeline to keep streaming card visible
    timeline.scrollTop = timeline.scrollHeight;
  }

  function finalizeStreamCard(speaker, turn) {
    // Remove specific streaming card
    var key = speaker + '-' + turn;
    var card = activeStreamCards[key];
    if (card) {
      card.remove();
      delete activeStreamCards[key];
    }
    // Also remove any card matching just the speaker (for closing statements with turn=-1)
    Object.keys(activeStreamCards).forEach(function(k) {
      if (k.startsWith(speaker + '-')) {
        activeStreamCards[k].remove();
        delete activeStreamCards[k];
      }
    });
  }

  function finalizeAllStreamCards() {
    // Remove ALL streaming cards (safety cleanup)
    Object.keys(activeStreamCards).forEach(function(k) {
      activeStreamCards[k].remove();
      delete activeStreamCards[k];
    });
  }

  // ── Download button ──
  function addDownloadButton(data) {
    var card = document.createElement('div');
    card.className = 'card card-facilitator';
    var btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = 'Download Report (.md)';
    btn.addEventListener('click', function() {
      var blob = new Blob([data.report], {type: 'text/markdown; charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'magi2-report.md';
      a.click();
      URL.revokeObjectURL(url);
    });
    card.appendChild(btn);
    timeline.appendChild(card);
  }

  // Simple Markdown to HTML (XSS-safe: escapes first, then applies formatting)
  function renderMd(text) {
    if (!text) return '';
    // Escape HTML entities
    var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // Headings: ### → h4, ## → h3
    safe = safe.replace(/^### (.+)$/gm, '<strong>$1</strong>');
    safe = safe.replace(/^## (.+)$/gm, '<h4 style="margin:8px 0 4px;">$1</h4>');
    // Bold: **text**
    safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic: *text*
    safe = safe.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
    // Unordered lists: - item
    safe = safe.replace(/^- (.+)$/gm, '<li>$1</li>');
    safe = safe.replace(/(<li>.*<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
    // Numbered lists: 1. item
    safe = safe.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Paragraphs: double newline
    safe = safe.replace(/\n\n/g, '</p><p>');
    // Single newlines: br
    safe = safe.replace(/\n/g, '<br>');
    return '<p>' + safe + '</p>';
  }

  function addTimelineCard(role, title, content) {
    var card = document.createElement('div');
    card.className = 'card card-' + role;
    var h = document.createElement('div');
    h.className = 'card-header';
    h.textContent = title;
    card.appendChild(h);
    var body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = renderMd(content);
    card.appendChild(body);
    timeline.appendChild(card);
  }

  function addPersonaTurn(data) {
    var card = document.createElement('div');
    card.className = 'card card-persona';

    var icon = data.icon || personaIcons[data.speaker] || '👤';
    var header = document.createElement('div');
    header.className = 'card-header';
    header.textContent = icon + ' ' + data.speaker + (data.turn > 0 ? ' — Turn ' + data.turn : '');
    card.appendChild(header);

    // Inner thoughts (hidden by default)
    if (data.inner_thoughts) {
      var thought = document.createElement('div');
      thought.className = 'thought-bubble';
      thought.style.display = showThoughts ? 'block' : 'none';
      thought.innerHTML = renderMd(data.inner_thoughts.honest_reaction);
      card.appendChild(thought);
    }

    var body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = renderMd(data.statement);
    card.appendChild(body);

    if (data.key_points && data.key_points.length > 0) {
      var points = document.createElement('ul');
      points.className = 'key-points';
      data.key_points.forEach(function(p) {
        var li = document.createElement('li');
        li.textContent = p;
        points.appendChild(li);
      });
      card.appendChild(points);
    }

    timeline.appendChild(card);
  }

  function addPersonaPanel(name, icon, archetype) {
    var panel = document.createElement('div');
    panel.className = 'persona-panel';
    panel.id = 'panel-' + name.replace(/\s+/g, '-');
    panel.innerHTML =
      '<div class="persona-name"><span class="persona-icon">' + icon + '</span> ' + name + '</div>' +
      '<div class="persona-archetype">' + archetype + '</div>' +
      '<div class="persona-readiness"><div class="readiness-bar"><div class="readiness-fill" style="width:0%"></div></div> <span class="readiness-value">0.00</span></div>' +
      '<div class="persona-stance"></div>';
    sidebar.appendChild(panel);
  }

  function updatePersonaPanel(name, data) {
    var panel = document.getElementById('panel-' + name.replace(/\s+/g, '-'));
    if (!panel) return;
    var fill = panel.querySelector('.readiness-fill');
    var val = panel.querySelector('.readiness-value');
    var stance = panel.querySelector('.persona-stance');
    if (fill) fill.style.width = Math.round(data.readiness_to_converge * 100) + '%';
    if (val) val.textContent = data.readiness_to_converge.toFixed(2);
    if (stance && data.stance_evolution) stance.textContent = data.stance_evolution;
  }

  connect();
})();
</script>
</body>
</html>
